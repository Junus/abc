<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alphabets - ABC Fun!</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="alphabets">
  <div class="header">
    <a href="index.html" class="back-btn">&larr; Home</a>
    <h1>Alphabets</h1>
    <button class="slideshow-start-btn" id="slideshow-start">Slideshow</button>
  </div>
  <div class="card-grid" id="card-grid"></div>

  <!-- Fullscreen Slideshow Overlay -->
  <div class="slideshow" id="slideshow" hidden>
    <button class="slideshow-close" id="slideshow-close">&times;</button>
    <div class="slideshow-content">
      <div class="slideshow-letter" id="slide-letter"></div>
      <div class="slideshow-word" id="slide-word"></div>
      <div class="slideshow-image-area" id="slide-image-area"></div>
      <button class="reveal-btn slideshow-reveal-btn" id="slide-reveal">Show Picture</button>
      <button class="reveal-btn slideshow-combo-btn" id="slide-combo">Combos</button>
    </div>
    <div class="slideshow-nav">
      <button class="slideshow-btn" id="slide-prev">&larr;</button>
      <span class="slideshow-counter" id="slide-counter"></span>
      <button class="slideshow-btn" id="slide-next">&rarr;</button>
      <button class="slideshow-btn" id="slide-rand">&#x1f3b2;</button>
    </div>
  </div>
  <!-- Combo Slideshow Overlay -->
  <div class="combo-overlay" id="combo-overlay" hidden>
    <button class="slideshow-close" id="combo-close">&times;</button>
    <div class="slideshow-content">
      <div class="combo-letter" id="combo-letter"></div>
    </div>
    <div class="slideshow-nav">
      <button class="slideshow-btn" id="combo-prev">&larr;</button>
      <span class="slideshow-counter" id="combo-counter"></span>
      <button class="slideshow-btn" id="combo-next">&rarr;</button>
    </div>
  </div>
  <script src="js/words-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
